version: 1
source: goal/fragments/environments.yaml
summary: Environment classes and capability defaults for goal compilation.
environments:
  - id: real_world
    label: Real-world authorized target
    default_intent: recon_only
    verified_lab: false
  - id: platform_lab
    label: Verified Hack The Box or equivalent platform lab
    default_intent: htb_lab
    verified_lab: true
  - id: local_ctf_container
    label: Local manifest-backed CTF/container lab
    default_intent: local_ctf_container
    verified_lab: true
  - id: test_fixture
    label: Deterministic test fixture
    default_intent: recon_only
    verified_lab: true
  - id: postmortem
    label: Postmortem/training mode
    default_intent: postmortem
    verified_lab: false
profile_intent_upgrades:
  - profile: hack_the_box
    environment: platform_lab
    default_intent: htb_lab
    requires_environment_proof: true
  - profile: co_internal_lab
    environment: local_ctf_container
    default_intent: local_ctf_container
    requires_environment_proof: true
capabilities:
  - environment: real_world
    action: lab_solve_progression
    decision: block
    lab_only: true
  - environment: real_world
    action: credential_validation
    decision: requires_approval
  - environment: real_world
    action: exploit_execution
    decision: requires_approval
  - environment: real_world
    action: flag_collection
    decision: block
    lab_only: true
  - environment: platform_lab
    action: lab_solve_progression
    decision: allow
    requires_environment_proof: true
    lab_only: true
  - environment: platform_lab
    action: credential_validation
    decision: allow
    requires_environment_proof: true
  - environment: platform_lab
    action: exploit_execution
    decision: allow
    requires_environment_proof: true
  - environment: platform_lab
    action: flag_collection
    decision: allow
    requires_environment_proof: true
    lab_only: true
  - environment: local_ctf_container
    action: lab_solve_progression
    decision: allow
    requires_environment_proof: true
    lab_only: true
  - environment: local_ctf_container
    action: credential_validation
    decision: allow
    requires_environment_proof: true
  - environment: local_ctf_container
    action: exploit_execution
    decision: allow
    requires_environment_proof: true
  - environment: local_ctf_container
    action: flag_collection
    decision: allow
    requires_environment_proof: true
    lab_only: true
  - environment: postmortem
    action: hidden_writeup_access
    decision: postmortem_only
markdown_policy:
  archive_root: /home/bitloop/Desktop/PRIMORDIAL_MARKDOWN_ARCHIVE
  files:
    - path: README.md
      authoritative: false
      exempt: true
      operational_rag_ingestible: false
    - path: AGENTS.md
      authoritative: false
      exempt: true
      operational_rag_ingestible: false
    - path: findings/notion/example/notion-export.md
      authoritative: false
      exempt: false
      operational_rag_ingestible: false
