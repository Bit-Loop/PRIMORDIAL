version: 1
source: goal/fragments/milestones.yaml
milestones:
  - id: M0
    label: safety/test-first baseline
    status: fully_complete
    completion_percent: 100
    evidence:
      - tests/test_goal_compile.py covers typed fragments, generated output verification, and sensitive current pointer exclusion.
      - goal/fragments/validation_tiers.yaml defines deterministic V0-V4 validation tiers.
      - goal/fragments/report_contract.yaml requires safety and dirty-work confirmations.
  - id: M1
    label: context-boundary hardening
    status: fully_complete
    completion_percent: 100
