      - tests/test_rag_import_validation.py covers source-ref and closed-book import provenance hardening.
      - Context sink, prompt, report, citation, and RAG admission regressions reject placeholder, unsupported, uncited, and malformed source_refs.
  - id: M2
    label: export and cleanup boundaries
    status: fully_complete
    completion_percent: 100
    evidence:
      - primordial/core/context/generated_exports.py and related context sink tests define generated-export boundaries.
      - tests/test_context_rag_index_writeup_policy.py covers writeup and generated-export quarantine behavior.
      - tests/test_rag_import_validation.py rejects generated-export paths across source URLs, encoded paths, metadata aliases, and runtime artifact fields.
  - id: M3
    label: sync architecture
    status: fully_complete
    completion_percent: 100
    evidence:
      - primordial/core/context/rag_index.py and primordial/core/rag/importer.py contain scoped sync/import paths.
      - RagContextBroker and RAG import validation now share source-ref, generated-export, writeup, poison, and metadata flag classifiers across source-to-sink paths.
      - V2 context/RAG suite validates assembler, sinks, broker, and import-validation behavior together.
  - id: M4
    label: environment and policy integration
    status: in_progress
    completion_percent: 55
    evidence:
      - goal/fragments/environments.yaml centralizes environment routing and lab-only capability gates.
      - tests/test_environment_classifier.py and tests/test_operator_intent_catalog_autonomy.py cover policy integration paths.
  - id: M5
    label: CTF harness contracts
    status: fully_complete
    completion_percent: 100
    evidence:
      - primordial/labs/ctf/targets.py and primordial/labs/ctf/sessions.py define target/session contracts.
      - tests/test_ctf_harness_targets.py and tests/test_ctf_harness_sessions.py validate core harness objects.
      - tests/test_ctf_harness_benchmark.py, tests/test_ctf_harness_ctfd_client.py, tests/test_ctf_harness_integrity.py, tests/test_ctf_harness_mutation.py, tests/test_ctf_harness_patch_proposal.py, and tests/test_ctf_harness_solve_verification.py validate solve lifecycle, scoring, mutation, CTFd, and integrity contracts.
      - tests/test_ctf_harness_targets.py validates local manifest-backed container targets select local_ctf_container default intent unless an explicit safe recon_only policy override is supplied.
  - id: M6
    label: anti-cheating controls
    status: fully_complete
    completion_percent: 100
    evidence:
      - primordial/labs/ctf/closed_book.py, hardcode.py, and hidden_material.py define anti-cheating boundaries.
      - tests/test_ctf_harness_closed_book.py and tests/test_ctf_harness_hardcode_scan.py validate closed-book and hardcode contracts.
      - tests/test_ctf_harness_postmortem.py, tests/test_ctf_harness_failure_analysis.py, and tests/test_ctf_harness_integrity.py validate postmortem-only writeup use, hidden-material rejection, and anti-cheating integrity gates.
  - id: M7
    label: modular refactor
    status: fully_complete
    completion_percent: 100
    evidence:
      - primordial/core/context modules split source refs, envelopes, sinks, reports, and task metadata into focused units.
      - primordial/core/context/metadata_flags.py centralizes recursive metadata false/raw lookup used by assembler, sinks, RAG index, and current refs.
      - tests/test_context_modularity.py passes with assembler line limits and duplicate-helper guards.
  - id: M8
    label: Markdown archive/removal
    status: in_progress
