id: local_ctf_container
label: Local CTF Container
description: Explicit behavior for manifest-backed local CTF/container labs.
policy:
  public_poc_research: false
  searchsploit_allowed: false
  read_poc_examples: false
  poc_applicability_validation: true
  exploit_code_generation: true
  poc_execution: true
  kerberos_policy:
    asrep_roast_check_allowed: false
    kerberoast_check_allowed: false
  credential_policy:
    credential_validation_allowed: true
    credential_guessing_allowed: false
    credential_spraying_allowed: false
    hash_cracking_allowed: false
  lab_policy:
    lab_flag_collection_allowed: true
    htb_lab_behavior_allowed: false
    reverse_shell_allowed: false
