id: htb_lab
label: HTB Lab
description: Explicit lab behavior for controlled HTB-style workflows.
policy:
  public_poc_research: true
  searchsploit_allowed: true
  read_poc_examples: true
  poc_applicability_validation: true
  exploit_code_generation: true
  poc_execution: true
  kerberos_policy:
    asrep_roast_check_allowed: true
    kerberoast_check_allowed: true
  credential_policy:
    credential_validation_allowed: true
    credential_guessing_allowed: false
    credential_spraying_allowed: false
    hash_cracking_allowed: false
  lab_policy:
    lab_flag_collection_allowed: true
    htb_lab_behavior_allowed: true
    reverse_shell_allowed: true
