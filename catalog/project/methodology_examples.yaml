      - focused_tests
      - operator_approval
    compiler_input_format: markdown
    generated_artifact_path: proposals/methodology/web_review/proposal.md
    proposal_semantics:
      - operator_review_required_before_promotion
      - strict_catalog_validation_required_before_promotion
      - focused_runtime_tests_required_before_promotion
      - proposal_local_artifacts_only
