authority: typed_advisory_examples_not_runtime_policy
markdown_authoritative: false
boundaries:
  - proposal_only
  - not_executable_by_default
  - baseline_catalogs_not_mutated_by_examples
  - operator_review_required_before_promotion
  - deterministic_validation_required_before_promotion
examples:
