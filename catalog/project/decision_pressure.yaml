    resolution_guards:
      - recon_only_generic_durable_default
      - environment_proof_required_for_lab_default_intent
      - missing_intent_or_evidence_explains_blocked_work
  - id: methodology_structure
    title: Explicit State Machines vs Evidence-Driven Methodology Planning
    source_of_difference: formal_state_correctness_vs_adaptive_planning
    side_a:
      label: explicit_state_machines
      snippet: make_task_session_methodology_state_machines_explicit_with_tables
      pros:
        - invalid_transitions_become_testable
        - easier_recovery_semantics
        - better_audit_trail_for_status_changes
      cons:
        - can_overfit_methodology_into_rigid_graph
