      label: durable_control_plane
      snippet: chat_is_not_the_source_of_truth_durable_runtime_state_is
      pros:
        - clear_state_lineage_for_scope_tasks_evidence_approvals_and_intent
        - safer_recovery_after_crashes_or_long_sessions
        - easier_to_test_and_explain
      cons:
        - more_ceremony_for_simple_operator_corrections
        - requires_explicit_ui_api_affordances
        - can_feel_slower_than_pure_chat_loop
    side_b:
      label: conversational_speed
      snippet: operator_said_it_in_chat_system_should_adapt_immediately
      pros:
        - faster_target_correction_and_workflow_steering
        - natural_operator_experience
        - lower_friction_for_exploratory_work
      cons:
        - harder_to_audit_why_task_was_planned
