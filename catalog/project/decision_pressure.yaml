        - transition_tables_can_hide_guards_elsewhere
    side_b:
      label: evidence_driven_planning
      snippet: methodology_is_planner_snapshot_derived_from_evidence
      pros:
        - responds_to_new_evidence_and_generation_changes
        - avoids_hardcoded_linear_methodology_paths
        - handles_blockers_and_no_progress_states
      cons:
